app:
  name: "LiveTrader"
  environment: "development"
  timezone: "UTC"

scheduler:
  cadence:
    unit: "minute" # "minute" or "hour"
    every: 1
    offsetSeconds: 15
  immediateRunOnBoot: true

exchange:
  requestTimeoutMs: 12000
  maxParallelRequests: 6

  # Fixed runtime model:
  # - Signal source: Bybit (sell-ratio/volume conditions)
  # - Execution source: MEXC (manual fills, account source-of-truth, price for PNL/TP/Liq)
  signal:
    name: "bybit"
    restBaseUrl: "https://api.bybit.com"
    tickerDeepLinkTemplate: "https://www.bybit.com/trade/usdt/{symbol}"
    futuresEndpoints:
      - name: "tickers"
        method: "GET"
        path: "/v5/market/tickers"
        query:
          category: "linear"
        enabled: true
        tags: ["futures", "price", "liquidity"]

      - name: "account_ratio"
        method: "GET"
        path: "/v5/market/account-ratio"
        symbolFanout: true
        query:
          category: "linear"
          period: "5min"
          limit: "1"
        enabled: true
        tags: ["futures", "sentiment", "sell_ratio", "buy_ratio"]

  execution:
    name: "mexc"
    restBaseUrl: "https://api.mexc.com"
    privateApi:
      baseUrl: "https://api.mexc.com"
      recvWindowMs: 10000
    tickerDeepLinkTemplate: "https://www.mexc.com/futures/{symbol}"
    futuresEndpoints:
      - name: "contract_detail"
        method: "GET"
        path: "/api/v1/contract/detail"
        enabled: true
        tags: ["futures", "metadata", "contracts"]

      - name: "ticker"
        method: "GET"
        path: "/api/v1/contract/ticker"
        enabled: true
        tags: ["futures", "price", "liquidity", "open_interest"]

strategies:
  basePath: "./strategies"
  active:
    - "xsp_v19"

telegram:
  enabled: true
  parseMode: "HTML"
  disableWebPagePreview: true
  commandPollMs: 4000
  apiBaseUrl: "https://api.telegram.org"
  requestTimeoutMs: 15000
  maxRetries: 4
  retryBaseDelayMs: 500
  retryMaxDelayMs: 5000
  getUpdatesLongPollSeconds: 0
  preferIpv4: true

manualExecution:
  enabled: true
  pendingPollMs: 5000
  autoRefreshMinutes: 60
  reconcileLookbackMinutes: 60

supabase:
  enabled: true
  schema: "public"
